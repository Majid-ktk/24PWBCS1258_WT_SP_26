<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cards</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/components.css">
</head>
<body>

  <nav>
    <a href="../../index.html">Home</a>
    <a href="../../lab02/profile.html">Profile</a>
  </nav>

  <div class="container">
    <h1>Course Cards</h1>

    <div class="card-row">

      <div class="card">
        <img src="https://picsum.photos/300/180?1" alt="Web Dev">
        <div class="card-body">
          <h3>Web Development</h3>
          <p>Learn HTML, CSS and JavaScript from the basics.</p>
          <span class="card-price">Rs. 2500</span>
          <button class="btn btn-primary">Enroll Now</button>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/180?2" alt="Python">
        <div class="card-body">
          <h3>Python Programming</h3>
          <p>Start programming with Python from scratch.</p>
          <span class="card-price">Rs. 3000</span>
          <button class="btn btn-primary">Enroll Now</button>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300/180?3" alt="Database">
        <div class="card-body">
          <h3>Database Systems</h3>
          <p>Learn SQL and relational databases properly.</p>
          <span class="card-price">Rs. 2000</span>
          <button class="btn btn-primary">Enroll Now</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
