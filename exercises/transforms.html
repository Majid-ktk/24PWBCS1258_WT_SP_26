<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Transforms</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/effects.css">
</head>
<body>

  <nav>
    <a href="../../index.html">Home</a>
  </nav>

  <div class="container">
    <h1>CSS Transform Gallery</h1>

    <h2>2D Transforms — hover each box</h2>
    <div class="t-row">
      <div class="t-box t-rotate">Rotate</div>
      <div class="t-box t-scale">Scale</div>
      <div class="t-box t-translate">Translate</div>
      <div class="t-box t-skew">Skew</div>
      <div class="t-box t-combined">Combined</div>
    </div>

    <h2>3D Flip</h2>
    <div class="t-row">
      <div class="t-box t-flip">3D Flip</div>
    </div>

    <h2>Transform Origin Demo</h2>
    <div class="t-row">
      <div class="t-box origin-center">Center</div>
      <div class="t-box origin-top">Top Left</div>
      <div class="t-box origin-bottom">Bottom Right</div>
    </div>

  </div>
</body>
</html>
