<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Portfolio</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/components.css">
</head>
<body>

  <nav>
    <a href="../index.html">Home</a>
    <a href="../Lab_02/profile.html">Profile</a>
  </nav>

  <div class="container">
    <h1>Image Styling</h1>

    <div class="gallery-row">

      <div class="gallery-item">
        <img src="../../assets/profile.jpg" alt="Rounded" class="img-rounded">
        <p>Rounded corners</p>
      </div>

      <div class="gallery-item">
        <img src="../../assets/profile.jpg" alt="Circle" class="img-circle">
        <p>Circular image</p>
      </div>

      <div class="gallery-item">
        <img src="../../assets/profile.jpg" alt="Framed" class="img-framed">
        <p>Framed with shadow</p>
      </div>

      <div class="gallery-item">
        <img src="../../assets/profile.jpg" alt="Gray" class="img-gray">
        <p>Grayscale filter</p>
      </div>

      <div class="img-card">
        <img src="../../assets/profile.jpg" alt="Hover card">
        <div class="img-overlay">View</div>
      </div>

    </div>
  </div>

</body>
</html>
