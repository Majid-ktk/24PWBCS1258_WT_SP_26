<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid Gallery</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/grid.css">
</head>
<body>
  <nav><a href="../../index.html">Home</a></nav>
  <div class="container">
    <h1>CSS Grid Photo Gallery</h1>
    <p>The featured photo spans two columns and two rows. The wide photo spans two columns.</p>

    <div class="photo-grid">
      <div class="photo-item big">
        <img src="https://picsum.photos/600/400?30" alt="Featured">
        <div class="photo-label">Featured</div>
      </div>
      <div class="photo-item">
        <img src="https://picsum.photos/300/200?31" alt="P2">
        <div class="photo-label">Photo 2</div>
      </div>
      <div class="photo-item">
        <img src="https://picsum.photos/300/200?32" alt="P3">
        <div class="photo-label">Photo 3</div>
      </div>
      <div class="photo-item wide">
        <img src="https://picsum.photos/600/200?33" alt="Wide">
        <div class="photo-label">Wide Photo</div>
      </div>
      <div class="photo-item">
        <img src="https://picsum.photos/300/200?34" alt="P5">
        <div class="photo-label">Photo 5</div>
      </div>
      <div class="photo-item">
        <img src="https://picsum.photos/300/200?35" alt="P6">
        <div class="photo-label">Photo 6</div>
      </div>
      <div class="photo-item">
        <img src="https://picsum.photos/300/200?36" alt="P7">
        <div class="photo-label">Photo 7</div>
      </div>
    </div>
  </div>
</body>
</html>
