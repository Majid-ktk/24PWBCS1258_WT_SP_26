<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Form</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/flexbox.css">
</head>
<body>
  <nav><a href="../../index.html">Home</a></nav>
  <div class="container">
    <h1>Responsive Flexbox Form</h1>
    <div class="form-card">
      <h2>Student Registration</h2>
      <form>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="Abdul" class="success">
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Majid">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="email@uetpeshawar.edu.pk" class="error">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" placeholder="03xx-xxxxxxx">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Registration Number</label>
            <input type="text" placeholder="24PWBCS1258">
          </div>
          <div class="form-group">
            <label>Section</label>
            <select><option>Section E</option><option>Section D</option><option>Section F</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full">
            <label>Address</label>
            <input type="text" placeholder="City, Province">
          </div>
        </div>
        <button type="submit" class="btn submit-btn">Submit Registration</button>
      </form>
    </div>
  </div>
</body>
</html>
